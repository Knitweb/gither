name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m py_compile src/gither/*.py
      - run: python -m pytest -q
      - run: python -m gither.cli python-audit --root src --strict
      - run: python -m gither.cli gate --repo . --python-root src --strict
      - run: python -m gither.cli route "benchmark Lens against LightRAG" --workspace examples/knitweb.workspace.json
      - run: python -m gither.cli graph --workspace examples/knitweb.workspace.json
